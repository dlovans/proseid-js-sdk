<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ProseID SDK visual preview</title>
		<style>
			body { margin: 0; background: #eef0ef; color: #171918; font-family: system-ui, sans-serif; }
			main { width: min(1500px, calc(100% - 32px)); margin: 54px auto 80px; }
			.preview-label { margin: 0 0 18px; color: #747a76; font: 600 11px ui-monospace, monospace; letter-spacing: .12em; text-transform: uppercase; }
			.gallery { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 28px; align-items: start; }
			.variant > span { display: block; margin: 0 0 9px; color: #747a76; font: 600 10px ui-monospace, monospace; letter-spacing: .1em; text-transform: uppercase; }
			@media (max-width: 980px) { .gallery { grid-template-columns: 1fr; } }
		</style>
	</head>
	<body>
		<main>
			<p class="preview-label">SDK development preview · no data leaves this page</p>
			<div class="gallery">
				<div class="variant"><span>Light · soft · full attribution</span><div id="soft"></div></div>
				<div class="variant"><span>Charcoal · capsule · compact attribution</span><div id="capsule"></div></div>
				<div class="variant"><span>Midnight · rigid · custom logo</span><div id="rigid"></div></div>
				<div class="variant"><span>Forest · underline · hidden attribution</span><div id="underline"></div></div>
			</div>
		</main>
		<script src="../../dist/proseid.min.js"></script>
		<script>
			const manifest = {
				ok: true,
				apiVersion: '2026-07-12',
				form: { ref: 'preview', title: 'Supplier assurance record', description: 'Document the supplier, review scope, and accountable declaration before the engagement proceeds.', schemaId: 'acme/supplier-assurance', schemaVersion: '1.0.0' },
				publisher: { slug: 'acme', name: 'Northstar Compliance', logo: null, verified: true },
				branding: { proseid: { name: 'ProseID', logo: 'http://127.0.0.1:8091/icon-placeholder.svg', url: 'https://proseid.com' } },
				schema: { definitions: {
					supplier_name: { type: 'string', label: 'Supplier name', required: true, placeholder: 'Registered organisation name' },
					jurisdiction: { type: 'select', label: 'Primary jurisdiction', required: true, options: ['Sweden', 'United Kingdom', 'European Union'] },
					review_date: { type: 'date', label: 'Review date', required: true },
					approved: { type: 'attestation', statement: 'I confirm this information is complete and ready for review.', required: true }
				} },
				capabilities: { validation: 'remote', auditRecord: true, receiptEmail: true, signing: { requested: false, available: false, mode: 'none' } }
			};
			const mockFetch = async (_url, options = {}) => {
				if (!options.body) {
					const attribution = options.headers['x-proseid-attribution'] || 'full';
					return new Response(JSON.stringify({ ...manifest, presentation: { attribution, whiteLabel: attribution === 'hidden', completionMicrons: attribution === 'hidden' ? 250 : 200, surchargeMicrons: attribution === 'hidden' ? 50 : 0 } }), { status: 200 });
				}
				const body = JSON.parse(options.body);
				if (body.action === 'complete') return new Response(JSON.stringify({ ok: true, status: 'completed', sessionId: 'preview_audit_record', duplicate: false, delivered: { email: true, webhook: false }, nextAction: null }), { status: 200 });
				if (body.action === 'email_receipt') return new Response(JSON.stringify({ ok: true, status: 'sent' }), { status: 200 });
				const valid = Boolean(body.responses.supplier_name && body.responses.jurisdiction && body.responses.review_date && body.responses.approved);
				return new Response(JSON.stringify({ ok: true, valid, status: valid ? 'READY' : 'INCOMPLETE', definitions: manifest.schema.definitions, issues: [] }), { status: 200 });
			};
			const base = { apiKey: `proseid_pk_${'a'.repeat(40)}`, form: 'acme/supplier-assurance', fetch: mockFetch };
			ProseID.mount('#soft', { ...base, appearance: 'soft', theme: 'light' });
			ProseID.mount('#capsule', { ...base, appearance: 'capsule', theme: 'charcoal', branding: { proseid: 'compact' } });
			ProseID.mount('#rigid', { ...base, appearance: { shape: 'rigid', density: 'compact' }, theme: 'midnight', branding: { logoUrl: 'http://127.0.0.1:8091/examples/preview/icon-placeholder.svg', logoAlt: 'Northstar symbol' } });
			ProseID.mount('#underline', { ...base, appearance: 'underline', theme: 'forest', branding: { proseid: 'hidden' } });
		</script>
	</body>
</html>
